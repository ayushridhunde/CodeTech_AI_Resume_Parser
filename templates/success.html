<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Parsing Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 50px; }
        .result-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .badge-skill { background-color: #007bff; color: white; margin-right: 5px; padding: 5px 10px; border-radius: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="result-card mx-auto" style="max-width: 600px;">
            <h2 class="text-success mb-4">Parsing Complete! ✅</h2>
            <p><strong>Email:</strong> {{ data.email }}</p>
            <p><strong>Detected Skills:</strong></p>
            <div class="mb-4">
                {% for skill in data.skills.split(', ') %}
                    <span class="badge-skill">{{ skill }}</span>
                {% endfor %}
            </div>
            <a href="/" class="btn btn-outline-primary w-100">Upload Another Resume</a>
        </div>
    </div>
</body>
</html>
